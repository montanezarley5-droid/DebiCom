<!DOCTYPE html>
<html lang="en">
<head>
    <title>DebiCom</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!--Estilos de Css-->
    <link rel="stylesheet" href="CSS/style.css">

    <!--Vinculacion con JS-->
    <script src="JS/Scripts.JS"></script>
</head>
<body>
    <!--Formulario de inicio de sesion-->
    <div class="card-box">
        <h3>iniciar sesion</h3>
        <form action="">
            <div class="mb-3">
                <!--Campo correo-->
                <label for="Correo" class="form-label">Correo Electronico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="Correo@Dominio.com" maxlength="30">
                </div>
            </div>           

            <div class="mb-3">
                <!--Campo contraseña-->
                <label for="Contraseña" class="form-label">Contraseña</label>
                <div class="input-group">
                    <button type="button" class="input-group-text btn" onclick="mostrar()"><i class="fa-solid fa-eye-slash" id="icon"></i></button>
                    <input type="password" class="form-control" placeholder="Contraseña" maxlength="30" id="pass">
                </div>
            </div>

            <!--Boton iniciar sesion-->
            <button type="submit" class="btn-main">Entrar</button>

        </form>
        
        <!--Redireccionamiento al registro-->
        <p class="text-center mt-3" style="font-size: 14px;">
            ¿No tienes una cuenta? <a href="register.html">Registrate</a>
        </p>
        <p class="text-center mt-3">
            <a href="FacturaYDetalle.html">Factura</a>
        </p>
    </div>
</body>
</html>
