<!DOCTYPE html>
<html lang="en">
<head>
    <title>DebiCom</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!--Estilos de Css-->
    <link rel="stylesheet" href="CSS/style.css">

    <!--Vinculacion con JS-->
    <script src="JS/Scripts.JS"></script>
</head>
<body>
    <!--Formulario de inicio de sesion-->
    <div class="card-box">
        <h3>Crea un nuevo tipo de documento.</h3>
        <form action="">

            <div class="mb-3">
                <!--Campo cupo de credito-->
                <label for="Cupo" class="form-label">Ingresa el nombre del tipo de documento.</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                    <input type="text" class="form-control" placeholder="Tipo documento" maxlength="30">
                </div>
            </div>      

            <!--Boton iniciar sesion-->
            <button type="submit" class="btn-main">Registrar</button>

        </form>
    </div>
</body>
</html>
