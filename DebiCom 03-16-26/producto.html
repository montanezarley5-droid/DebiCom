<!DOCTYPE html>
<html lang="en">
<head>
    <title>DebiCom</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!--Estilos de Css-->
    <link rel="stylesheet" href="CSS/style.css">

    <!--Vinculacion con JS-->
    <script src="JS/Scripts.JS"></script>

</head>
<body>
    <!--Formulario de productos-->
    <div class="card-box">
        <h3>Productos</h3>
        <form action="">
            <div class="mb-3">
              <!--campo de productos-->
            <label for="Nombre" class="form-label"></label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-product-hunt "></i></span>
                <input type="Nombre" class="form-control" placeholder="Nombre producto" maxlength="30">

            </div>
        </div>    



         <div class="mb-3">
            <!--Campo descripcion-->
            <label for="descripcion" class="form-label"></label>
            <div class="input-group">
                <button type="button" class="input-group-text btn" onclick="mostrar()"><i class="fa-solid fa-sort-alpha-desc" id="icon"></i></button>
                 <input type="descripcion" class="form-control" placeholder="Descripcion Producto" maxlength="30" id="pass">
             </div>
        </div>

            
        <!--Boton iniciar sesion-->
        <button type="submit" class="btn-main">Entrar</button>

    </form>
        
    
    </div>
</body>
</html>
