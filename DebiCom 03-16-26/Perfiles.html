<!DOCTYPE html>
<html lang="en">
<head>
    <title>DebiCom</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!--Estilos de Css-->
    <link rel="stylesheet" href="CSS/style.css">

    <!--Vinculacion con JS-->
    <script src="JS/Scripts.JS"></script>
</head>
<body>
    <!--Formulario de inicio de sesion-->
    <div class="card-box">
        <h3>Registra tu negocio</h3>
        <form action="">

            <div class="mb-3">
                <!--Campo correo-->
                <label for="Correo" class="form-label">Registra tu negocio</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-building"></i></span>
                    <input type="email" class="form-control" placeholder="Nombre de tu negocio" maxlength="30">
                </div>
            </div> 

            <!--Boton iniciar sesion-->
            <button type="submit" class="btn-main">Registrar</button>

        </form>

    </div>
</body>
</html>
