<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!--Estilos de Css-->
    <link rel="stylesheet" href="CSS/Stylefactura.css">

    <!--Vinculacion con JS-->
    <script src="JS/Scripts.JS"></script>

  <title>Factura</title>
</head> 
<body>
    <main>
        <h1>Facturacion</h1>
        <p>DebiCom</p>
        <div class="contenedor">
        
        <table class="client">
            <tr>
                <th><label for="Producto" class="form-label">Nombre del producto</label></th>
                <th><label for="Cantidad" class="form-label">Cantidad</label></th>
            </tr>
            <tr>
                <td><input type="text" name="Producto" placeholder="Producto" class="input-group-text"></td>
                <td><input type="text" oninput="formatCurrency(this)" name="Cantidad" placeholder="Cantidad" maxlength="10" class="input-group-text"></td>
            </tr>
        </table>
        
        <button type="submit" class="btn-main">Agregar producto</button>
        <h2>Cabeza Factura</h2>
            <table class="client">
                <tr>
                    <th><label for="NombreCLiente">Nombre del cliente</label></th>
                    <th><label for="ApellidoCLiente">Apellido del cliente</label></th> <br>
                    <th><label for="NumeroFactura">Numero de factura</label></th>
                    <th><label for="DocumentoFactura">Documento factura</label></th>
                </tr>
                <tr>
                    <td><input type="text" name="NombreCLiente" placeholder="Nombre" class="input-group-text"></td>
                    <td><input type="text" name="ApellidoCLiente" placeholder="Apellido" class="input-group-text"></td> <br>
                    <td><input type="text" name="NumeroFactura" placeholder="Numero de factura" class="input-group-text"></td>
                    <td><input type="text" name="DocumentoFactura" placeholder="Documento de factura" class="input-group-text"></td>
                </tr>
            </table>
        <hr size="1">
        <div class="DetalleFactura">
            
        <table class="description">
            </div>
            
            <tr>
                <th>Producto</th>
                <th>Unidad</th>
                <th>Precio unitario</th>
                <th>Precio total</th>
            </tr>
            <tr>
                <td>Papas margarita</td>
                <td>3</td>
                <td>3,000</td>
                <td>9,000</td>
            </tr>
            <tr>
                <td>Jugo Hit Mango</td>
                <td>2</td>
                <td>2,000</td>
                <td>4,000</td>
            </tr>
            <tr>
                <td>Pirulito</td>
                <td>5</td>
                <td>3,00</td>
                <td>1,500</td>
            </tr>
            <tr>
                <td>Tictac</td>
                <td>3</td>
                <td>2,000</td>
                <td>6,000</td>
            </tr>
    
    <div class="PrecioFinal">
            <tr>
                <td>Subtotal</td>
                <td>20,500</td>
            </tr>
            <tr>
                <td>Iva 19%</td>
                <td>3,895</td>
            </tr>
            <tr>
                <td>Total</td>
                <td>24,395</td>
            </tr>
                
        </table>
        <button type="button" class="btn-main">Proceder al pago</button>
    </div>
    </main>
    </div>
</body>
</html>
