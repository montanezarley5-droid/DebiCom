<!DOCTYPE html>
<html lang="en">
<head>
    <title>DebiCom</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!--Estilos de Css-->
    <link rel="stylesheet" href="CSS/style.css">

    <!--Vinculacion con JS-->
    <script src="JS/Scripts.JS"></script>
</head>
<body>
    <!--Formulario de Pago-->
    <div class="card-box">
        <h3>Pago</h3>
        <form action="">
            <div class="mb-3">
                <!--Campo de Pago-->
                <label for="Numero referencia" class="form-label">Referencia Pago </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-newspaper"></i></span>
                    <input type="number" class="form-control" placeholder="No.Referencia" maxlength="30">
                </div>
            </div>           
            <div class="mb-3">
                <!campo fecha de pago>
                <label for="fecha" class="form-label">Fecha Pago</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-calendar-days"></i></span>
                    <input type="date" class="form-control" placeholder="" maxlength="30" id="pass">
                </div>
            </div>

            
            <!--Boton iniciar sesion-->
            <button type="submit" class="btn-main">Entrar</button>

        </form>
   </div>
</body>
</html>
